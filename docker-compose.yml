version: '3.8'

services:
  database_postgres:
    image: postgres:latest
    container_name: postgres-ddap-container
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql 

volumes:
  postgres_data: